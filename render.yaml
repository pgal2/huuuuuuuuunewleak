services:
  - type: web
    name: saini-txt-direct
    env: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: bash -lc 'gunicorn app:app --bind 0.0.0.0:${PORT:-10000} --workers 1 --threads 4 & python3 modules/main.py'
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: OWNER
        sync: false
      - key: CREDIT
        sync: false
